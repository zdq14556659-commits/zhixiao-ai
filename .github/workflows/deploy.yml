name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "DEPLOY_HOST 为空" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "DEPLOY_USER 为空" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "DEPLOY_SSH_KEY 为空" && exit 1)
          echo "Secrets 检查通过"

      - name: Pack archive
        run: |
          tar -czf /tmp/zhixiao-ai.tar.gz \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=backend/data/db.json \
            --exclude=backend/data/db.backup.json \
            --exclude=backend/uploads \
            --exclude=miniprogram/project.private.config.json \
            --exclude=.env \
            -C "$GITHUB_WORKSPACE" .

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to server
        run: |
          scp /tmp/zhixiao-ai.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/zhixiao-ai.tar.gz

      - name: Release on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "/usr/local/sbin/zhixiao-release /tmp/zhixiao-ai.tar.gz"
