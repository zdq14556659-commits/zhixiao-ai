name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack archive
        run: |
          tar -czf zhixiao-ai.tar.gz \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=backend/data/db.json \
            --exclude=backend/data/db.backup.json \
            --exclude=backend/uploads \
            --exclude=miniprogram/project.private.config.json \
            --exclude=.env \
            .

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to server
        run: |
          scp -i ~/.ssh/deploy_key zhixiao-ai.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/zhixiao-ai.tar.gz

      - name: Release on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "/usr/local/sbin/zhixiao-release /tmp/zhixiao-ai.tar.gz"
