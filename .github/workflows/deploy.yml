name: Deploy to Server

on:
  push:
    branches: [main]

concurrency:
  group: zhixiao-ai-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "DEPLOY_HOST 为空" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "DEPLOY_USER 为空" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "DEPLOY_SSH_KEY 为空" && exit 1)
          echo "Secrets 检查通过"

      - name: Pack archive
        run: |
          tar -czf /tmp/zhixiao-ai.tar.gz \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=backend/data/db.json \
            --exclude=backend/data/db.backup.json \
            --exclude=backend/uploads \
            --exclude=miniprogram/project.private.config.json \
            --exclude=.env \
            -C "$GITHUB_WORKSPACE" .

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to server
        run: |
          scp /tmp/zhixiao-ai.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/zhixiao-ai.tar.gz

      - name: Sync server runtime config
        run: |
          scp \
            deploy/tencent/zhixiao-ai.service \
            deploy/tencent/zhixiao-ai-resources.conf \
            deploy/tencent/release.sh \
            deploy/tencent/backup.sh \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -s" <<'EOF'
          set -euo pipefail
          install -m 0644 /tmp/zhixiao-ai.service /etc/systemd/system/zhixiao-ai.service
          mkdir -p /etc/systemd/system/zhixiao-ai.service.d
          install -m 0644 /tmp/zhixiao-ai-resources.conf /etc/systemd/system/zhixiao-ai.service.d/zz-resources.conf
          install -m 0755 /tmp/release.sh /usr/local/sbin/zhixiao-release
          install -m 0755 /tmp/backup.sh /usr/local/sbin/zhixiao-backup
          rm -f /tmp/zhixiao-ai.service /tmp/zhixiao-ai-resources.conf /tmp/release.sh /tmp/backup.sh
          systemctl daemon-reload
          systemctl show zhixiao-ai -p MemoryHigh -p MemoryMax -p Environment --no-pager || true
          EOF

      - name: Backup server database
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "DEPLOY_RUN_ID=${{ github.run_id }} bash -s" <<'EOF'
          set -euo pipefail
          DATA_DIR="${ZHIXIAO_DATA_DIR:-/opt/zhixiao-ai/shared/data}"
          DATA_FILE="$DATA_DIR/db.json"
          BACKUP_DIR="$DATA_DIR/manual-backups"
          STAMP="$(date +%Y%m%d-%H%M%S)"
          mkdir -p "$BACKUP_DIR"
          if [ ! -f "$DATA_FILE" ]; then
            echo "DB file not found: $DATA_FILE" >&2
            exit 1
          fi
          BACKUP_FILE="$BACKUP_DIR/db-before-deploy-$STAMP-${DEPLOY_RUN_ID}.json"
          cp "$DATA_FILE" "$BACKUP_FILE"
          echo "DB backup saved: $BACKUP_FILE"
          EOF

      - name: Release on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "/usr/local/sbin/zhixiao-release /tmp/zhixiao-ai.tar.gz"

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -fsS --max-time 5 https://isales.santi.ren/crm/api/health; then
              echo ""
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for backend health... ($i/30)"
            sleep 2
          done
          echo "Health check failed: https://isales.santi.ren/crm/api/health"
          exit 1

      - name: Collect server diagnostics on failure
        if: failure()
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -s" <<'EOF' || true
          set +e
          echo "===== process ====="
          pgrep -af "node|zhixiao|server.js" || true
          echo "===== service status ====="
          systemctl status zhixiao-ai --no-pager || true
          echo "===== service journal ====="
          journalctl -u zhixiao-ai -n 200 --no-pager || true
          echo "===== nginx error log ====="
          tail -n 200 /var/log/nginx/error.log || true
          EOF
