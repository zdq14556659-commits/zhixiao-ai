services:
  - type: web
    name: zhixiao-ai
    runtime: node
    plan: starter
    repo: https://github.com/zdq14556659-commits/zhixiao-ai
    branch: main
    buildCommand: "npm install --omit=dev"
    startCommand: "npm start"
    healthCheckPath: "/api/health"
    autoDeployTrigger: commit
    disk:
      name: zhixiao-ai-data
      mountPath: /var/data/zhixiao-ai
      sizeGB: 1
    envVars:
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: AMAP_KEY
        sync: false
      - key: TENCENT_MAP_SERVER_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: "deepseek-chat"
      - key: DATA_DIR
        value: "/var/data/zhixiao-ai/data"
      - key: UPLOAD_DIR
        value: "/var/data/zhixiao-ai/uploads"
      - key: NODE_VERSION
        value: "20"
