services:
  - type: web
    name: zhixiao-ai
    env: node
    plan: starter
    buildCommand: "npm install --omit=dev"
    startCommand: "npm start"
    disk:
      name: zhixiao-ai-data
      mountPath: /var/data/zhixiao-ai
      sizeGB: 1
    envVars:
      - key: AMAP_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: "deepseek-chat"
      - key: DATA_DIR
        value: "/var/data/zhixiao-ai/data"
      - key: UPLOAD_DIR
        value: "/var/data/zhixiao-ai/uploads"
      - key: NODE_VERSION
        value: "20"
